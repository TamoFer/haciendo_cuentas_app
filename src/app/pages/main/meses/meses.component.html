<app-header title="Mes de {{mes | titlecase}}" [mostrarVolver]="usuarioLogeado"
  (volverAccion)="confirmarSignOut()"></app-header>

<ion-content>

  <ion-chip
    style="width: 100%; display: flex; flex-direction: row; justify-content: space-between; font-weight: bold; ">
    <ion-label style="display: flex; flex-direction: row;"><ion-icon name="reader-outline"
        color="dark"></ion-icon>DETALLE</ion-label>
    <ion-label style="display: flex; flex-direction: row;"><ion-icon name="logo-usd"
        color="dark"></ion-icon>IMPORTE</ion-label>
    <ion-label style="display: flex; flex-direction: row;"><ion-icon name="calculator-outline"
        color="dark"></ion-icon>CUOTAS</ion-label>
  </ion-chip>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button>
      <ion-icon name="menu-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-list side="top">
      <ion-fab-button>
        <ion-icon name="swap-horizontal-outline" color="primary" style="font-size: 1.5rem;"
          id="present-alert"></ion-icon>
      </ion-fab-button>
      <ion-fab-button>
        <ion-icon name="remove-circle-outline" color="danger" style="font-size: 2rem;"></ion-icon>
        <ion-icon name="card-outline" style="font-size: 2rem;"></ion-icon>
      </ion-fab-button>
      <ion-fab-button>
        <ion-icon name="add-circle-outline" color="success" style="font-size: 2rem;"></ion-icon>
        <ion-icon name="wallet-outline" style="font-size: 2rem;"></ion-icon>
      </ion-fab-button>

    </ion-fab-list>
  </ion-fab>
</ion-content>
<app-footer></app-footer>

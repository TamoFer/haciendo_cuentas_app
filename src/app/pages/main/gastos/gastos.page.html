<app-header title="Gastos" [mostrarVolver]="usuarioLogeado" [routerLink]="['/home']"></app-header>
<ion-content>
    <p style="text-transform: uppercase; margin-left: 10px;">El listado de tus gastos {{nombreUser}} </p>
    <!-- <p style="text-transform: uppercase; margin-left: 10px;">Gastado hasta la fecha {{totalGastos | currency:'ARS'}} -->
    <!-- </p> -->

    <div class="filtros">
        <ion-checkbox labelPlacement="end" justify="start" (click)="busquedaPorFechas = !busquedaPorFechas">Buscar por
            fecha
        </ion-checkbox>
        <ion-list *ngIf="busquedaPorFechas">
            <form [formGroup]="filtrosFecha">
                <div class="filtros-fecha">
                    <ion-item>
                        <ion-label style="font-weight: bold;">Desde</ion-label>
                        <ion-input type="date" formControlName="desde"></ion-input>
                    </ion-item>
                    <ion-item>
                        <ion-label style="font-weight: bold;">Hasta</ion-label>
                        <ion-input type="date" formControlName="hasta"></ion-input>
                    </ion-item>
                </div>
            </form>
        </ion-list>
        <ion-checkbox labelPlacement="end" justify="start" (click)="busquedaPorOtros = !busquedaPorOtros">Buscar
            por rubro o detalle
        </ion-checkbox>

    </div>

    <ion-list *ngIf="busquedaPorOtros">
        <form [formGroup]="filtrosOtros">
            <div class="filtros-especificos">
                <ion-item>
                    <ion-label>Rubro</ion-label>
                    <ion-select formControlName="rubro">
                        <ion-select-option *ngFor="let r of rubros" [value]="r">{{r}}</ion-select-option>
                    </ion-select>
                </ion-item>
                <ion-item>
                    <ion-label>Detalle</ion-label>
                    <ion-input formControlName="detalle"></ion-input>
                </ion-item>
            </div>
        </form>
        <ion-button style="margin-left: 40%;" [disabled]="filtrosFecha.valid "
            (click)=" filtrarDatos()">Filtrar</ion-button>
    </ion-list>





    <ion-item-sliding *ngFor=" let mov of movimientosCuenta ">

        <ion-card color=" danger" *ngIf="mov.genero == 'gasto' ">
            <ion-card-header>
                <ion-card-title> $ {{mov.importe }}</ion-card-title>
                <ion-card-subtitle>Realizada el {{ mov.fecha | date:'dd/MM'}} </ion-card-subtitle>
                <ion-card-subtitle>Fue {{mov.rubro}}</ion-card-subtitle>
            </ion-card-header>
            <ion-card-content style="text-align: center; text-transform: uppercase; font-weight: bold;">
                {{mov.detalle}}
            </ion-card-content>
        </ion-card>

    </ion-item-sliding>
</ion-content>
<app-footer></app-footer>

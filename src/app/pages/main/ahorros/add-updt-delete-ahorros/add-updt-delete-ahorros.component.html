<app-header [title]="ahorro ? 'Modificar Ahorro':'Nuevo Ahorro'" [isModal]="mostrarBack"
  (volverAccion)="cerrarModal()"></app-header>
<ion-content>
  <form [formGroup]="formulario" (ngSubmit)="submit()">


    <!-- fecha  -->
    <app-ingreso-datos icon="calendar-number-outline" autocomplete="detail" label="Fecha"
      [control]="formulario.controls.fecha" type="date"></app-ingreso-datos>

    <div *ngIf="formulario.controls.fecha.errors && formulario.controls.fecha.touched">
      <div class="errores" *ngIf="formulario.controls.fecha.errors?.['required']">La fecha es necesario</div>
    </div>

    <!-- importe  -->
    <app-ingreso-datos icon="logo-usd" autocomplete="detail" label="Importe" [control]="formulario.controls.importe"
      [maskito]="mascara" [maskitoElement]="maskPredicate" inputmode="decimal" type='text'></app-ingreso-datos>


    <div *ngIf="formulario.controls.importe.errors && formulario.controls.importe.touched">
      <div class="errores" *ngIf="formulario.controls.importe.errors?.['required']">El importe es necesario</div>
      <div class="errores" *ngIf="formulario.controls.importe.errors?.['min']">El importe debe ser mayor a 0
      </div>
    </div>

    <!-- detalle  -->
    <app-ingreso-datos icon="document-text-outline" autocomplete="detail" label="Detalle"
      [control]="formulario.controls.detalle" inputmode="text" type='text'></app-ingreso-datos>

    <div *ngIf="formulario.controls.detalle.errors && formulario.controls.detalle.touched">
      <div class="errores" *ngIf="formulario.controls.detalle.errors?.['required']">El detalle es necesario</div>
      <div class="errores" *ngIf="formulario.controls.detalle.errors?.['minlength']">El detalle debe tener al
        menos 1
        caracteres</div>
    </div>

    <!-- moneda  -->
    <app-ingreso-datos icon="list-outline" autocomplete="detail" label="Moneda" [type]="'select'"
      [options]="opcionesMoneda" [control]="formulario.controls.moneda">
    </app-ingreso-datos>

    <div *ngIf="formulario.controls.moneda.errors && formulario.controls.moneda.touched">
      <div class="errores" *ngIf="formulario.controls.moneda.errors?.['required']">Elije la moneda en que ahorraste
      </div>

    </div>


    <!-- meta-->
    <app-ingreso-datos icon="list-outline" autocomplete="detail" label="Meta" [type]="'select'" [options]="listadoMetas"
      [control]="formulario.controls.meta" *ngIf="!ahorro">
    </app-ingreso-datos>

    <div *ngIf="formulario.controls.meta.errors && formulario.controls.meta.touched">
      <div class="errores" *ngIf="formulario.controls.meta.errors?.['required']">El tipo es necesario</div>
    </div>


    <div style="width: max-content; display: flex; flex-direction: row ; justify-content: center; margin: 10px auto;">
      <ion-button type="submit" [disabled]="!formulario.valid" shape="round">
        {{ahorro ? 'Modificar ': 'Agregar'}}
        <ion-icon slot="end" [name]="ahorro? 'pencil' : 'checkmark-circle'"></ion-icon>
      </ion-button>
    </div>

  </form>
</ion-content>
<app-footer></app-footer>

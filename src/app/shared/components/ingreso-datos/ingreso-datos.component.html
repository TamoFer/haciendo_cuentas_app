<ion-item>
  <div>
    <div class="input-email">
      <ion-icon *ngIf="icon" color="primary" slot="start" [name]="icon"></ion-icon>

      <!-- INPUT normal -->
      <ion-input *ngIf="type !== 'select' " [type]="type" [autocomplete]="autocomplete" [label]="label"
        [formControl]="control" label-placement="floating" [clearInput]="true" fill="outline" [maskito]="maskito"
        [maskitoElement]="maskitoElement">
      </ion-input>

      <!-- SELECT (cuando el tipo es 'select') -->
      <ion-select *ngIf="type === 'select'" [formControl]="control" [label]="label" label-placement="floating"
        interface="popover" fill="outline">

        <ion-select-option *ngFor="let opcion of options" [value]="opcion">
          {{ opcion }}
        </ion-select-option>

      </ion-select>
    </div>
  </div>
  <ion-button *ngIf="contrasenia" (click)="hideShowPassword()" slot="end" fill="clear" shape="round">
    <ion-icon slot="icon-only" [name]="ocultarVer ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
  </ion-button>

</ion-item>
